<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d55;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f0f0f"/>
  <!-- TT Letters -->
  <text x="256" y="240" font-family="Arial Black, sans-serif" font-size="180" font-weight="900"
    text-anchor="middle" fill="url(#grad)" filter="url(#glow)">TT</text>
  <!-- Download Arrow -->
  <line x1="256" y1="290" x2="256" y2="380" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>
  <polyline points="210,345 256,395 302,345" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Bottom bar -->
  <line x1="180" y1="415" x2="332" y2="415" stroke="url(#grad)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
</svg>
